<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>History Quiz</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #252836;
    --accent: #6c63ff; --green: #22c55e; --red: #ef4444;
    --yellow: #f59e0b; --text: #e2e8f0; --muted: #64748b;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .screen { display: none; width: 100%; max-width: 700px; padding: 24px 16px; }
  .screen.active { display: block; }

  /* HOME */
  .home-topbar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
  .lang-btn { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 7px 16px; color: var(--text); font-family: inherit; font-size: 14px; cursor: pointer; transition: border-color 0.15s; }
  .lang-btn:hover { border-color: var(--accent); }
  .home-title { font-size: clamp(38px, 9vw, 68px); font-weight: 800; text-align: center; line-height: 1.1; margin-bottom: 10px; }
  .home-sub { text-align: center; color: var(--muted); font-size: 16px; margin-bottom: 40px; }
  .diff-label { text-align: center; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
  .diff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .diff-btn { border: 2px solid; background: transparent; border-radius: 14px; padding: 28px 16px; cursor: pointer; transition: background 0.18s, transform 0.15s; text-align: center; font-family: inherit; }
  .diff-btn:hover { transform: translateY(-4px); }
  .diff-btn .diff-icon { font-size: 36px; display: block; margin-bottom: 10px; }
  .diff-btn .diff-name { font-size: 18px; font-weight: 700; display: block; }
  .diff-btn .diff-desc { font-size: 12px; color: var(--muted); margin-top: 4px; display: block; }
  .diff-btn.easy   { border-color: var(--green);  color: var(--green); }
  .diff-btn.easy:hover   { background: rgba(34,197,94,0.1); }
  .diff-btn.medium { border-color: var(--yellow); color: var(--yellow); }
  .diff-btn.medium:hover { background: rgba(245,158,11,0.1); }
  .diff-btn.hard   { border-color: var(--red);    color: var(--red); }
  .diff-btn.hard:hover   { background: rgba(239,68,68,0.1); }
  .hs-row { display: flex; gap: 16px; justify-content: center; margin-top: 28px; flex-wrap: wrap; }
  .hs-pill { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 6px 16px; font-size: 13px; color: var(--muted); }
  .hs-pill span { color: var(--text); font-weight: 600; }

  /* LANG MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 28px 24px; max-width: 420px; width: 90%; }
  .modal-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 20px; }
  .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .lang-opt { background: var(--bg); border: 2px solid var(--border); border-radius: 12px; padding: 14px 16px; cursor: pointer; font-family: inherit; color: var(--text); font-size: 15px; display: flex; align-items: center; gap: 10px; transition: border-color 0.15s, background 0.15s; }
  .lang-opt:hover { border-color: var(--accent); background: rgba(108,99,255,0.08); }
  .lang-opt.selected { border-color: var(--accent); background: rgba(108,99,255,0.15); }
  .lang-flag { font-size: 22px; }
  .modal-close { margin-top: 16px; width: 100%; background: var(--border); border: none; border-radius: 10px; padding: 11px; color: var(--text); font-family: inherit; font-size: 14px; cursor: pointer; }
  .modal-close:hover { background: #333; }

  /* QUIZ */
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
  .quiz-meta { display: flex; flex-direction: column; }
  .diff-tag { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
  .diff-tag.easy   { color: var(--green); }
  .diff-tag.medium { color: var(--yellow); }
  .diff-tag.hard   { color: var(--red); }
  .quiz-counter { font-size: 14px; color: var(--muted); }
  .score-pill { background: var(--card); border: 1px solid var(--border); border-radius: 999px; padding: 6px 14px; font-size: 14px; font-weight: 600; white-space: nowrap; }
  .timer-wrap { flex-shrink: 0; }
  .timer-svg { display: block; }
  .timer-ring { transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }
  .timer-text { font-size: 12px; font-weight: 700; fill: var(--text); dominant-baseline: central; text-anchor: middle; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
  .question-card { background: var(--card); border: 2px solid var(--border); border-radius: 18px; padding: 32px 28px; margin-bottom: 20px; min-height: 130px; display: flex; align-items: center; justify-content: center; text-align: center; }
  .question-text { font-size: clamp(16px, 3.5vw, 22px); font-weight: 600; line-height: 1.5; }
  .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .opt-btn { background: var(--card); border: 2px solid var(--border); border-radius: 13px; padding: 14px 18px; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 12px; text-align: left; transition: border-color 0.15s, background 0.15s, transform 0.12s; }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-2px); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { border-color: var(--green); background: rgba(34,197,94,0.12); }
  .opt-btn.wrong   { border-color: var(--red);   background: rgba(239,68,68,0.12); }
  .opt-btn.dimmed  { opacity: 0.35; }
  .letter-tag { min-width: 28px; height: 28px; background: var(--border); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .opt-btn.correct .letter-tag { background: var(--green); color: #000; }
  .opt-btn.wrong   .letter-tag { background: var(--red);   color: #fff; }
  .float-pts { position: fixed; font-size: 22px; font-weight: 800; color: var(--yellow); pointer-events: none; animation: floatUp 0.85s ease-out forwards; z-index: 999; }
  @keyframes floatUp { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-60px); } }

  /* RESULT */
  .result-score { text-align: center; font-size: clamp(56px,14vw,96px); font-weight: 800; margin-bottom: 4px; }
  .result-grade { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 30px; }
  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 13px; padding: 14px 10px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-main { background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 13px 28px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
  .btn-main:hover { opacity: 0.82; }
  .btn-ghost { background: var(--card); color: var(--text); border: 2px solid var(--border); border-radius: 12px; padding: 13px 28px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
  .btn-ghost:hover { opacity: 0.82; }

  /* MODE BUTTONS */
  .mode-section { }
  .mode-label { text-align: center; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .mode-btn { border: 3px solid; background: transparent; border-radius: 18px; padding: 36px 20px; cursor: pointer; transition: background 0.18s, transform 0.15s; text-align: center; font-family: inherit; }
  .mode-btn:hover { transform: translateY(-5px); }
  .mode-btn .mode-icon { font-size: 52px; display: block; margin-bottom: 12px; }
  .mode-btn .mode-name { font-size: 22px; font-weight: 800; display: block; }
  .mode-btn .mode-desc { font-size: 13px; color: var(--muted); margin-top: 6px; display: block; }
  .mode-btn.kids   { border-color: #f59e0b; color: #f59e0b; }
  .mode-btn.kids:hover   { background: rgba(245,158,11,0.12); }
  .mode-btn.adults { border-color: var(--accent); color: var(--accent); }
  .mode-btn.adults:hover { background: rgba(108,99,255,0.12); }
  .diff-section { display: none; }
  .back-btn { display: flex; align-items: center; gap: 8px; background: none; border: none; color: var(--muted); font-family: inherit; font-size: 14px; cursor: pointer; margin-bottom: 18px; padding: 0; }
  .back-btn:hover { color: var(--text); }

  /* KIDS THEME */
  body.kids-mode { --bg: #fef3c7; --card: #ffffff; --border: #fcd34d; --accent: #d97706; --green: #16a34a; --red: #dc2626; --yellow: #d97706; --text: #1c1917; --muted: #78716c; }
  body.kids-mode .home-title { font-size: clamp(32px,8vw,58px); }
  body.kids-mode .question-text { font-size: clamp(18px,4vw,26px); }
  body.kids-mode .opt-btn { font-size: 16px; padding: 18px 20px; border-radius: 16px; }
  body.kids-mode .diff-btn { border-radius: 20px; }

  @media (max-width: 520px) {
    .opts-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2,1fr); }
    .diff-grid { grid-template-columns: 1fr; }
    .lang-grid { grid-template-columns: 1fr; }
    .mode-grid { grid-template-columns: 1fr; }
  }

  /* ── DESIGN STUDIO ────────────────────────────────────────────────────────── */
  .studio-btn-wrap { text-align: center; margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--border); }
  .btn-studio { background: linear-gradient(135deg,#f59e0b,#ef4444); border: none; border-radius: 14px; padding: 16px 36px; font-size: 17px; font-weight: 700; font-family: inherit; cursor: pointer; color: #fff; transition: opacity 0.15s, transform 0.15s; box-shadow: 0 4px 24px rgba(245,158,11,0.35); }
  .btn-studio:hover { opacity: 0.88; transform: translateY(-3px); }

  .ed-header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .ed-back { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--text); font-family: inherit; font-size: 14px; cursor: pointer; }
  .ed-back:hover { border-color: var(--accent); }
  .ed-title { font-size: 22px; font-weight: 800; }

  .ed-stage { width: 300px; height: 400px; border-radius: 24px; position: relative; overflow: hidden; margin: 0 auto 20px; border: 3px solid var(--border); box-shadow: 0 20px 60px rgba(0,0,0,0.5); cursor: default; perspective: 1000px; }
  #ed-char-svg { display: block; filter: drop-shadow(0 14px 28px rgba(0,0,0,0.5)); transform: rotateX(6deg); transform-origin: center bottom; transition: filter 0.3s; }
  .char-bounce { animation: charBounce 0.45s cubic-bezier(.36,.07,.19,.97) both; }
  .ed-stage-bg { position: absolute; inset: 0; background: linear-gradient(180deg,#87CEEB 55%,#f4d03f 55%); transition: background 0.45s; }
  .ed-scatter { position: absolute; inset: 0; display: flex; flex-wrap: wrap; align-items: flex-start; padding: 10px 8px; gap: 5px; font-size: 22px; pointer-events: none; z-index: 1; }
  .ed-scatter span { display: inline-block; animation: scatterBob 3s ease-in-out infinite; }
  .ed-scatter span:nth-child(2n) { animation-delay: -1.1s; }
  .ed-scatter span:nth-child(3n) { animation-delay: -2.2s; }
  @keyframes scatterBob { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-7px) rotate(6deg)} }
  .ed-char-container { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 2; }
  @keyframes charBounce { 0%,100%{transform:rotateX(6deg) scale(1)} 25%{transform:rotateX(6deg) scale(1.06,.94) translateY(5px)} 60%{transform:rotateX(6deg) scale(.96,1.06) translateY(-8px)} }

  .ed-tabs { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
  .ed-tab { padding: 9px 4px; background: var(--card); border: 2px solid var(--border); border-radius: 10px; color: var(--muted); font-family: inherit; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.15s; line-height:1; }
  .ed-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,0.1); }
  .ed-tab:hover:not(.active) { border-color: var(--text); color: var(--text); }

  .ed-items-wrap { max-height: 220px; overflow-y: auto; border-radius: 12px; padding-right: 2px; }
  .ed-items-wrap::-webkit-scrollbar { width: 4px; }
  .ed-items-wrap::-webkit-scrollbar-track { background: transparent; }
  .ed-items-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  #ed-items-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; padding: 2px; }
  .ed-item { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 10px 6px 8px; cursor: pointer; text-align: center; font-family: inherit; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .ed-item:hover { border-color: var(--accent); transform: translateY(-2px); }
  .ed-item.selected { border-color: var(--accent); background: rgba(108,99,255,0.13); box-shadow: 0 0 0 2px rgba(108,99,255,0.25); }
  .item-emoji { font-size: 30px; line-height: 1.1; }
  .item-name { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
  .item-bg-prev { width: 42px; height: 32px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; overflow: hidden; flex-shrink: 0; }

  @media (max-width: 520px) {
    #ed-items-grid { grid-template-columns: repeat(3,1fr); }
    .ed-stage { width: 260px; height: 340px; }
  }

  /* COINS */
  .coin-bar { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:16px; background:linear-gradient(135deg,#1c1a10,#2a2310); border:2px solid #b8860b; border-radius:14px; padding:10px 22px; font-size:20px; font-weight:800; color:#fbbf24; }
  .ed-coin-bar { display:flex; align-items:center; gap:6px; margin-left:auto; font-size:14px; font-weight:700; color:#fbbf24; background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.3); border-radius:999px; padding:4px 12px; }

  /* HOME AVATAR */
  .home-avatar-section { display:flex; align-items:center; gap:18px; margin-bottom:22px; padding:16px 20px; background:var(--card); border:2px solid var(--border); border-radius:20px; cursor:pointer; transition:border-color 0.2s, transform 0.2s; }
  .home-avatar-section:hover { border-color:var(--accent); transform:translateY(-2px); }
  #home-avatar-wrap { width:80px; height:124px; flex-shrink:0; overflow:hidden; }
  #home-avatar-wrap svg { width:80px; height:124px; }
  .home-avatar-info { flex:1; }
  .home-avatar-label { font-size:13px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
  .home-avatar-cta { font-size:15px; font-weight:700; color:var(--accent); }

  /* STORE / LOCK */
  .ed-item.locked { position:relative; }
  .ed-item.locked .item-lock { font-size:12px; }
  .item-price { font-size:9px; color:#fbbf24; font-weight:800; margin-top:1px; }
  .item-owned-badge { font-size:9px; color:var(--green); font-weight:700; margin-top:1px; }

  /* TOAST */
  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(0); background:var(--card); border:2px solid var(--border); border-radius:14px; padding:12px 28px; font-size:14px; font-weight:600; z-index:9999; pointer-events:none; animation:toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards; white-space:nowrap; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(10px)} }
  .float-coin { position:fixed; font-size:15px; font-weight:800; color:#fbbf24; pointer-events:none; animation:floatUp 1.1s ease-out forwards; z-index:999; }
</style>
</head>
<body>

<!-- LANGUAGE MODAL -->
<div id="lang-modal" class="modal-overlay" onclick="if(event.target===this)closeLangModal()">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Choose Language</div>
    <div class="lang-grid">
      <button class="lang-opt" id="lo-en" onclick="setLang('en')"><span class="lang-flag">🇬🇧</span> English</button>
      <button class="lang-opt" id="lo-ru" onclick="setLang('ru')"><span class="lang-flag">🇷🇺</span> Русский</button>
      <button class="lang-opt" id="lo-fr" onclick="setLang('fr')"><span class="lang-flag">🇫🇷</span> Français</button>
      <button class="lang-opt" id="lo-de" onclick="setLang('de')"><span class="lang-flag">🇩🇪</span> Deutsch</button>
      <button class="lang-opt" id="lo-it" onclick="setLang('it')"><span class="lang-flag">🇮🇹</span> Italiano</button>
    </div>
    <button class="modal-close" onclick="closeLangModal()" id="modal-close-btn">Close</button>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-title" id="home-title">📜 History Quiz</div>
  <div class="home-sub" id="home-sub">Test your knowledge of world history</div>

  <!-- MODE SELECTION -->
  <div id="mode-section" class="mode-section">
    <div class="mode-label" id="mode-label">Who is playing?</div>
    <div class="mode-grid">
      <button class="mode-btn kids" onclick="selectMode('kids')">
        <span class="mode-icon">🧒</span>
        <span class="mode-name" id="kids-name">Kids</span>
        <span class="mode-desc" id="kids-desc">Fun & easy questions</span>
      </button>
      <button class="mode-btn adults" onclick="selectMode('adults')">
        <span class="mode-icon">👨</span>
        <span class="mode-name" id="adults-name">Adults</span>
        <span class="mode-desc" id="adults-desc">Choose your challenge</span>
      </button>
    </div>
  </div>

  <!-- DIFFICULTY SELECTION (shown after Adults picks language) -->
  <div id="diff-section" class="diff-section">
    <button class="back-btn" onclick="showModeSection()">← <span id="back-label">Back</span></button>
    <div class="diff-label" id="diff-label">Choose difficulty</div>
    <div class="diff-grid">
      <button class="diff-btn easy" onclick="startGame('easy')">
        <span class="diff-icon">🟢</span>
        <span class="diff-name" id="easy-name">Easy</span>
        <span class="diff-desc" id="easy-desc">20s · Familiar events</span>
      </button>
      <button class="diff-btn medium" onclick="startGame('medium')">
        <span class="diff-icon">🟡</span>
        <span class="diff-name" id="med-name">Medium</span>
        <span class="diff-desc" id="med-desc">15s · Deeper knowledge</span>
      </button>
      <button class="diff-btn hard" onclick="startGame('hard')">
        <span class="diff-icon">🔴</span>
        <span class="diff-name" id="hard-name">Hard</span>
        <span class="diff-desc" id="hard-desc">10s · Expert level</span>
      </button>
    </div>
  </div>

  <div class="hs-row">
    <div class="hs-pill" id="hs-easy-pill">🟢 Easy best: <span id="hs-easy">—</span></div>
    <div class="hs-pill" id="hs-med-pill">🟡 Medium best: <span id="hs-medium">—</span></div>
    <div class="hs-pill" id="hs-hard-pill">🔴 Hard best: <span id="hs-hard">—</span></div>
  </div>
  <!-- HOME AVATAR PREVIEW -->
  <div id="home-avatar-section" class="home-avatar-section" onclick="openEditor()" style="display:none">
    <div id="home-avatar-wrap"></div>
    <div class="home-avatar-info">
      <div class="home-avatar-label" id="home-avatar-label">Your Avatar</div>
      <div class="home-avatar-cta" id="home-avatar-cta">✏️ Customize</div>
      <div class="coin-bar" style="margin-top:10px;margin-bottom:0;padding:7px 16px;font-size:16px;border-radius:10px">🪙 <span id="home-coin-count">0</span></div>
    </div>
  </div>

  <div class="studio-btn-wrap">
    <button class="btn-studio" id="btn-studio" onclick="openEditor()">🎨 Design Studio</button>
  </div>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="quiz-header">
    <div class="quiz-meta">
      <div class="diff-tag" id="diff-tag">EASY</div>
      <div class="quiz-counter" id="q-counter">Question 1 of 10</div>
    </div>
    <div class="score-pill">⭐ <span id="score-display">0</span></div>
    <div class="timer-wrap">
      <svg class="timer-svg" width="48" height="48" viewBox="0 0 48 48">
        <circle cx="24" cy="24" r="19" fill="none" stroke="#252836" stroke-width="4"/>
        <circle id="timer-ring" class="timer-ring" cx="24" cy="24" r="19"
          fill="none" stroke="#22c55e" stroke-width="4" stroke-linecap="round"
          stroke-dasharray="119.38" stroke-dashoffset="0" transform="rotate(-90 24 24)"/>
        <text id="timer-text" class="timer-text" x="24" y="24">20</text>
      </svg>
    </div>

// ── HIGH SCORES ───────────────────────────────────────────────────────────────
function getHS() { try { return JSON.parse(localStorage.getItem('historyQuiz')||'{}'); } catch(e){ return {}; } }
function saveHS(d,s) { var h=getHS(); if(!h[d]||s>h[d]){h[d]=s;localStorage.setItem('historyQuiz',JSON.stringify(h));} }
function updateHomeHS() {
  var h=getHS(), t=UI[currentLang];
  document.getElementById('hs-easy-pill').childNodes[0].textContent = t.easyPill + ' ';
  document.getElementById('hs-med-pill').childNodes[0].textContent  = t.medPill  + ' ';

  document.getElementById('hs-easy').textContent   = h.easy   != null ? h.easy   : '—';
  document.getElementById('hs-medium').textContent = h.medium != null ? h.medium : '—';
  document.getElementById('hs-hard').textContent   = h.hard   != null ? h.hard   : '—';
}

// ── SHUFFLE ───────────────────────────────────────────────────────────────────
function shuffle(arr) { for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;} return arr; }

// ── START ─────────────────────────────────────────────────────────────────────
function startGame(d) {
  if (currentMode === 'kids') document.body.classList.add('kids-mode');
  else document.body.classList.remove('kids-mode');
  diff=d;
  var key=currentLang+'_'+d;
  var allQ=DB[currentLang][d].slice();
  var last=lastUsedQuestions[key]||[];
  var fresh=allQ.filter(function(q){return last.indexOf(q.q)<0;});
  var used=allQ.filter(function(q){return last.indexOf(q.q)>=0;});
  shuffle(fresh); shuffle(used);
  var combined=fresh.concat(used);
  pool=combined.slice(0,TOTAL);
  lastUsedQuestions[key]=pool.map(function(q){return q.q;});
  qIdx=0; score=0; correctCount=0; streak=0; bestStreak=0; times=[]; answered=false; coinsThisGame=0;
  var tag=document.getElementById('diff-tag');
  tag.textContent=UI[currentLang][d==='easy'?'easy':d==='medium'?'med':'hard'].toUpperCase();
  tag.className='diff-tag '+d;
  show('quiz'); loadQuestion();
}

// ── LOAD QUESTION ─────────────────────────────────────────────────────────────
function loadQuestion() {
  clearInterval(timerInterval); answered=false;
  var q=pool[qIdx], t=UI[currentLang];
  document.getElementById('q-counter').textContent = t.qOf.replace('{n}',qIdx+1).replace('{t}',TOTAL);
  document.getElementById('score-display').textContent=score;
  document.getElementById('progress-fill').style.width=(qIdx/TOTAL*100)+'%';
  document.getElementById('question-text').textContent=q.q;
  var opts=shuffle(q.opts.slice()), grid=document.getElementById('opts-grid');
  grid.innerHTML='';
  ['A','B','C','D'].forEach(function(l,i){
    var btn=document.createElement('button'); btn.className='opt-btn';
    btn.innerHTML='<span class="letter-tag">'+l+'</span>'+escHtml(opts[i]);
    btn.dataset.opt=opts[i];
    btn.onclick=function(){if(!answered)pick(opts[i],btn,q.answer);};
    grid.appendChild(btn);
  });
  startTimer(DIFF[diff].time); startTime=Date.now();
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer(total){
  timeLeft=total; renderTimer(timeLeft,total);
  timerInterval=setInterval(function(){
    timeLeft-=0.1;
    if(timeLeft<=0){timeLeft=0;renderTimer(0,total);clearInterval(timerInterval);onTimeout();}
    else renderTimer(timeLeft,total);
  },100);
}
function renderTimer(left,total){
  var frac=left/total, offset=CIRC*(1-frac);
  document.getElementById('timer-ring').style.strokeDashoffset=offset;
  document.getElementById('timer-ring').style.stroke=frac>0.5?'#22c55e':frac>0.25?'#f59e0b':'#ef4444';
  document.getElementById('timer-text').textContent=Math.ceil(left);
}
function onTimeout(){
  if(answered)return; answered=true; streak=0; times.push(DIFF[diff].time);
  var q=pool[qIdx];
  document.querySelectorAll('.opt-btn').forEach(function(b){
    b.disabled=true;
    if(b.dataset.opt===q.answer)b.classList.add('correct'); else b.classList.add('dimmed');
  });
  setTimeout(nextQuestion,1200);
}

// ── PICK ──────────────────────────────────────────────────────────────────────
function pick(opt,btn,correct){
  if(answered)return; answered=true; clearInterval(timerInterval);
  var elapsed=(Date.now()-startTime)/1000; times.push(elapsed);
  document.querySelectorAll('.opt-btn').forEach(function(b){b.disabled=true;});
  if(opt===correct){
    btn.classList.add('correct'); correctCount++; streak++; if(streak>bestStreak)bestStreak=streak;
    var rem=Math.max(0,DIFF[diff].time-elapsed), pts=DIFF[diff].base+Math.round(rem*DIFF[diff].bonus);
    score+=pts; document.getElementById('score-display').textContent=score;
    floatPoints('+'+pts,btn);
    var coinGain = diff==='easy'?5:diff==='medium'?10:20;
    earnCoins(coinGain);
    floatCoin('+🪙'+coinGain, btn);
    document.querySelectorAll('.opt-btn').forEach(function(b){if(b!==btn)b.classList.add('dimmed');});
  } else {
    btn.classList.add('wrong'); streak=0;
    document.querySelectorAll('.opt-btn').forEach(function(b){
      if(b.dataset.opt===correct)b.classList.add('correct'); else if(b!==btn)b.classList.add('dimmed');
    });
  }
  setTimeout(nextQuestion,1100);
}

// ── FLOAT PTS ─────────────────────────────────────────────────────────────────
function floatPoints(text,el){
  var r=el.getBoundingClientRect(), div=document.createElement('div');
  div.className='float-pts'; div.textContent=text;
  div.style.left=(r.left+r.width/2-30)+'px'; div.style.top=(r.top-10)+'px';
  document.body.appendChild(div); setTimeout(function(){div.remove();},900);
}
function floatCoin(text,el){
  var r=el.getBoundingClientRect(), div=document.createElement('div');
  div.className='float-coin'; div.textContent=text;
  div.style.left=(r.left+r.width/2+20)+'px'; div.style.top=(r.top-24)+'px';
  document.body.appendChild(div); setTimeout(function(){div.remove();},1100);
}

// ── NEXT / RESULT ─────────────────────────────────────────────────────────────
function nextQuestion(){qIdx++;if(qIdx>=TOTAL)showResult();else loadQuestion();}
function showResult(){
  clearInterval(timerInterval); saveHS(diff,score);
  var avgSpeed=times.length?(times.reduce(function(a,b){return a+b;},0)/times.length).toFixed(1):'—';
  var hs=getHS()[diff]||0, cfg=DIFF[diff];
  var pct=score/((cfg.base+cfg.bonus*cfg.time)*TOTAL);
  var gs=UI[currentLang].grades;
  var grade=pct>=0.8?{msg:gs[0],col:'#f59e0b'}:pct>=0.6?{msg:gs[1],col:'#22c55e'}:pct>=0.4?{msg:gs[2],col:'#6c63ff'}:pct>=0.2?{msg:gs[3],col:'#64748b'}:{msg:gs[4],col:'#ef4444'};
  document.getElementById('result-score').textContent=score;
  document.getElementById('result-grade').textContent=grade.msg;
  document.getElementById('result-grade').style.color=grade.col;
  document.getElementById('stat-correct').textContent=correctCount+'/'+TOTAL;
  document.getElementById('stat-speed').textContent=avgSpeed+'s';
  document.getElementById('stat-streak').textContent=bestStreak+(bestStreak>0?' 🔥':'');
  document.getElementById('stat-best').textContent=hs;
  show('result');
}
function restart(){
  if (currentMode === 'kids') { document.body.classList.add('kids-mode'); startGame('easy'); }
  else startGame(diff);
}

var edState = {bg:'beach', hat:'none', clothes:'none', shoes:'classic', socks:'none', pants:'p1', skin:'sk1', hair:'h1', tab:'backgrounds'};
var coins = parseInt(localStorage.getItem('historyCoins') || '0');
var ownedItems = JSON.parse(localStorage.getItem('historyOwned') || '{}');
var FREE_IDS = ['beach','space','none','tshirt','classic','sk1','sk2','sk3','sk4','sk5','sk6','h1','h2','h3','h4','p1','p2'];
var coinsThisGame = 0;

function isOwned(id, cat) {
  if (FREE_IDS.indexOf(id) >= 0) return true;
  if (ownedItems[id] === true) return true;
  if (cat && ownedItems[cat+':'+id] === true) return true;
  return false;
}

function earnCoins(n) {
  coins += n; coinsThisGame += n;
  localStorage.setItem('historyCoins', coins);
  updateCoinDisplay();
}

function updateCoinDisplay() {
  ['home-coin-count','ed-coin-count'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.textContent = coins;
  });
}

function showToast(msg) {
  var t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(function(){ t.remove(); }, 2200);
}

function tryBuy(id, price, key) {
  if (isOwned(id, key)) { edSelect(key, id); return; }
  if (coins < price) { showToast('🪙 Need ' + price + ' coins — keep playing!'); return; }
  if (!confirm('Buy for 🪙 ' + price + ' coins?')) return;
  coins -= price;
  localStorage.setItem('historyCoins', coins);
  ownedItems[key+':'+id] = true;
  localStorage.setItem('historyOwned', JSON.stringify(ownedItems));
  updateCoinDisplay();
  edSelect(key, id);
  showToast('✅ Unlocked!');
}

function updateHomeAvatar() {
  var wrap = document.getElementById('home-avatar-wrap');
  var sec = document.getElementById('home-avatar-section');
  if (!wrap) return;
  sec.style.display = 'flex';
  var src = document.getElementById('ed-char-svg');
  var html = src.outerHTML;
  html = html.replace(/\bid="([^"]+)"/g, 'id="hav-$1"');
  html = html.replace(/url\(#([^)]+)\)/g, 'url(#hav-$1)');
  html = html.replace(/filter="url\(#hav-(ds|hs)\)"/g, 'filter="url(#hav-$1)"');
  html = html.replace('width="260"', 'width="80"');
  html = html.replace('viewBox="0 0 180 280"', 'viewBox="22 30 136 200"');
  wrap.innerHTML = html;
}

function openEditor() {
  edSetTab('backgrounds');
  applyEditorState();
  updateCoinDisplay();
  show('editor');
}

function edSetTab(tab) {
  edState.tab = tab;
  document.querySelectorAll('.ed-tab').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab === tab);
  });
  renderEditorItems();
}

function edSelect(key, id) {
  edState[key] = id;
  applyEditorState();
  renderEditorItems();
  var svg = document.getElementById('ed-char-svg');
  svg.classList.remove('char-bounce');
  void svg.offsetWidth;
  svg.classList.add('char-bounce');
}

function applyEditorState() {
  var bg = ED.backgrounds.find(function(b){return b.id===edState.bg;}) || ED.backgrounds[0];
  document.getElementById('ed-stage-bg').style.background = bg.bg;
  document.getElementById('ed-scatter').innerHTML = bg.sc.map(function(e){return '<span>'+e+'</span>';}).join('');

  document.querySelectorAll('[data-hat]').forEach(function(g){ g.setAttribute('display','none'); });
  var hatEl = document.querySelector('[data-hat="'+edState.hat+'"]');
  if (hatEl) hatEl.removeAttribute('display');

  document.querySelectorAll('[data-clothes]').forEach(function(g){ g.setAttribute('display','none'); });
  var clEl = document.querySelector('[data-clothes="'+edState.clothes+'"]');
  if (clEl) clEl.removeAttribute('display');
  var cl = ED.clothes.find(function(c){return c.id===edState.clothes;}) || ED.clothes[0];
  document.getElementById('blg0').setAttribute('stop-color', cl.c0);
  document.getElementById('blg1').setAttribute('stop-color', cl.c1);
  document.getElementById('alg0').setAttribute('stop-color', cl.c0);
  document.getElementById('alg1').setAttribute('stop-color', cl.c1);

  document.querySelectorAll('[data-shoes]').forEach(function(g){ g.setAttribute('display','none'); });
  var shEl = document.querySelector('[data-shoes="'+edState.shoes+'"]');
  if (shEl) shEl.removeAttribute('display');

  document.querySelectorAll('[data-socks]').forEach(function(g){ g.setAttribute('display','none'); });
  var skEl = document.querySelector('[data-socks="'+edState.socks+'"]');
  if (skEl) skEl.removeAttribute('display');

  var tone = ED.skin.find(function(t){return t.id===edState.skin;}) || ED.skin[0];
  ['rgs0','rgs1','rgs2'].forEach(function(id,i){
    var el=document.getElementById(id); if(el) el.setAttribute('stop-color', i===0?tone.c0:tone.c1);
  });
  var hs=document.getElementById('head-side'), ht=document.getElementById('head-top');
  if(hs) hs.setAttribute('fill', tone.side);
  if(ht) ht.setAttribute('fill', tone.top);

  var hc = ED.hair.find(function(h){return h.id===edState.hair;}) || ED.hair[0];
  var h0=document.getElementById('rgh0'), h1=document.getElementById('rgh1');
  if(h0) h0.setAttribute('stop-color', hc.c0);
  if(h1) h1.setAttribute('stop-color', hc.c1);

  var pnt = ED.pants.find(function(p){return p.id===edState.pants;}) || ED.pants[0];
  var p0=document.getElementById('plg0'), p1=document.getElementById('plg1');
  if(p0) p0.setAttribute('stop-color', pnt.c0);
  if(p1) p1.setAttribute('stop-color', pnt.c1);
}

function renderEditorItems() {
  var tab = edState.tab;
  var tabMap = {
    backgrounds:{items:ED.backgrounds, key:'bg'},
    hats:       {items:ED.hats,        key:'hat'},
    clothes:    {items:ED.clothes,     key:'clothes'},
    shoes:      {items:ED.shoes,       key:'shoes'},
    socks:      {items:ED.socks,       key:'socks'},
    pants:      {items:ED.pants,       key:'pants'},
    skin:       {items:ED.skin,        key:'skin'},
    hair:       {items:ED.hair,        key:'hair'},
  };
  var cfg = tabMap[tab] || tabMap.backgrounds;
  var items = cfg.items, key = cfg.key;
  document.getElementById('ed-items-grid').innerHTML = items.map(function(item){
    var owned = isOwned(item.id, key);
    var sel = (edState[key]===item.id) ? ' selected' : '';
    var lockedCls = owned ? '' : ' locked';
    var lockIcon = '🔒';
    var preview;
    if (tab === 'backgrounds') {
      var sc2 = item.sc ? item.sc.slice(0,2).join('') : '';
      preview = '<div class="item-bg-prev" style="background:'+item.bg+'">'+(owned?sc2:lockIcon)+'</div>';
    } else if (tab === 'clothes') {
      preview = '<div style="width:42px;height:32px;border-radius:8px;background:linear-gradient(135deg,'+item.c0+','+item.c1+');display:flex;align-items:center;justify-content:center;font-size:'+(owned?'18':'14')+'px">'+(owned?item.e:lockIcon)+'</div>';
    } else if (tab === 'skin') {
      preview = owned
        ? '<div style="width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 30%,'+item.c0+','+item.c1+')"></div>'
        : '<div style="width:40px;height:40px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center">'+lockIcon+'</div>';
    } else if (tab === 'hair') {
      preview = owned
        ? '<div style="width:42px;height:28px;border-radius:14px 14px 50% 50%;background:radial-gradient(ellipse at 50% 30%,'+item.c0+','+item.c1+')"></div>'
        : '<div style="width:42px;height:28px;border-radius:10px;background:#333;display:flex;align-items:center;justify-content:center">'+lockIcon+'</div>';
    } else if (tab === 'pants') {
      preview = owned
        ? '<div style="width:42px;height:32px;border-radius:8px;background:linear-gradient(135deg,'+item.c0+','+item.c1+')"></div>'
        : '<div style="width:42px;height:32px;border-radius:8px;background:#333;display:flex;align-items:center;justify-content:center">'+lockIcon+'</div>';
    } else {
      preview = '<div class="item-emoji">'+(owned?(item.e||'✨'):lockIcon)+'</div>';
    }
    var badge = owned
      ? (item.price===0 ? '<span class="item-owned-badge">FREE</span>' : '<span class="item-owned-badge">✓</span>')
      : '<span class="item-price">🪙'+item.price+'</span>';
    var onclick = owned
      ? 'edSelect(\''+key+'\',\''+item.id+'\')'
      : 'tryBuy(\''+item.id+'\','+item.price+',\''+key+'\')';
    return '<button class="ed-item'+sel+lockedCls+'" onclick="'+onclick+'">'
      +preview+'<span class="item-name">'+item.n+'</span>'+badge+'</button>';
  }).join('');
}
